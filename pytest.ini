[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers --tb=short -p no:cacheprovider
markers =
    regression: Regression tests for search endpoint
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    smoke: Smoke tests
env_files =
    .env.test
    .env.regression
pythonpath = .